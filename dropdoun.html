<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drop down</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .custom_select {
        position: relative;
        width: 135px;
        cursor: pointer;
      }
      .custom_select .selected {
        padding: 5px 10px;
        border: 1px solid #ccc;
        background: transparent;
        position: relative;
        height: 38px;
        align-items: center;
        font-size: 12px;
        display: flex;
      }
      .custom_select .options {
        display: none;
        position: absolute;
        width: 100%;
        background: #fff;
        border: 1px solid #ccc;
        z-index: 1000;
        font-size: 12px;
      }
      .custom_select .options div {
        padding: 5px 10px;
      }
      .custom_select .options div:hover {
        background-color: #a67c52;
        color: #fff;
      }
      .custom_select.active .options {
        display: block;
      }
      .custom_select .selected::after {
        content: "";
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        border-left: 5px solid transparent;
        border-right: 5px solid transparent;
        border-top: 6px solid #333;
      }
      .custom_select.active .selected::after {
        transform: translateY(-50%) rotate(180deg);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="custom_select" id="customSelect">
        <div class="selected">Price</div>
        <div class="options">
          <div data-value="">Price</div>
          <div data-value="0-2000">Under ₹2,000</div>
          <div data-value="2000-4000">₹2,000 - ₹4,000</div>
          <div data-value="4000-999999">Above ₹4,000</div>
        </div>
      </div>
    </div>
  </body>
  <script>
    const select = document.getElementById("customSelect");
    const selected = select.querySelector(".selected");
    const options = select.querySelectorAll(".options div");

    // Toggle dropdown
    selected.addEventListener("click", () => {
      select.classList.toggle("active");
    });

    // Select option
    options.forEach((option) => {
      option.addEventListener("click", () => {
        selected.textContent = option.textContent;
        select.classList.remove("active");
      });
    });

    // Close when clicking outside
    document.addEventListener("click", (e) => {
      if (!select.contains(e.target)) {
        select.classList.remove("active");
      }
    });
  </script>
</html>
