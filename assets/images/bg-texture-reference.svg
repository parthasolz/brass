<svg xmlns="http://www.w3.org/2000/svg" width="168" height="168" viewBox="0 0 168 168" preserveAspectRatio="none">
  <defs>
    <filter id="noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="34" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.048"/>
      </feComponentTransfer>
    </filter>
    <radialGradient id="fade" cx="50%" cy="45%" r="78%">
      <stop offset="60%" stop-color="#f2efe7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#e5e0d4" stop-opacity="0.16"/>
    </radialGradient>
  </defs>

  <rect width="168" height="168" fill="#f2efe7"/>
  <rect width="168" height="168" filter="url(#noise)"/>
  <rect width="168" height="168" fill="url(#fade)"/>
</svg>
