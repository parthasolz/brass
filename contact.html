<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Us</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="assets/css/style.css" />

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <style>
        .contact_section {
            padding: 80px 0;
        }

        .contact_section h1 {
            font-family: "Cormorant Garamond", serif;
            font-size: 48px;
            font-weight: 500;
            line-height: 1.03;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .contact_section .title p {
            font-size: 16px;
            padding-bottom: 40px;
            text-align: center;
        }

        /* Cards */
        .info-card {
            background: #f4ece3;
            padding: 0 25px 50px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            border: 1px solid #e0d6c8;
        }

        .info_card_wrap {
            padding-top: 50px;
        }

        .info_card_wrap h5 {
            font-family: "Cormorant Garamond", serif;
            font-size: 24px;
            color: #3e3128;
            font-weight: 500;
            padding: 0;
        }

        .info_card_wrap .info_wrappper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info_card_wrap .info_wrappper a {
            color: #3e3128;
            text-decoration: none;
        }

        .info_card_wrap .info_wrappper a:hover {
            color: #A67C52
        }

        .info_card_wrap .info_wrappper i {
            color: #3e3128;
        }

        .info_card_wrap .social-circle {
            width: 35px;
            height: 35px;
            font-size: 18px;
        }

        .form-box h3 {
            font-size: 30px;
            text-align: center;
            font-family: "Cormorant Garamond", serif;
            color: #3e3128;
            font-weight: 600;
            padding: 0 0 15px;
        }

        .form-box {
            background: #f4ece3;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #e0d6c8;
        }
        .custom-input {
            border: 1.5px solid #cbbfb3;
            border-radius: 8px;
            padding: 12px;
            background: transparent;
        }
        .custom-input:focus {
            border-color: #A67C52 !important;
            box-shadow: none !important;
            background: transparent;
        }
        textarea.custom-input {
            height: 120px;
            resize: none;
        }
        .btn-custom {
            background: #A67C52;
            border-radius: 5px;
            padding: 12px;
            width: 100%;
            border: 1px solid rgba(58, 45, 33, 0.42);
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #ece1cf;
            border: 1px solid rgba(58, 45, 33, 0.42);
        }

        /* Bottom image */
        .bottom-img {
            margin-top: 40px;
            border-radius: 10px;
            overflow: hidden;
            height: 300px;
        }
        .bottom-img img{object-fit: cover; object-position: center;}
        /* reponsive */
        @media (max-width: 1366px) {
            .contact_section h1{font-size: 40px;}
            .info_card_wrap h5{font-size: 22px;}
            .form-box h3 {font-size: 26px;}
        }
        @media (max-width: 1199px) {
            .contact_section h1{font-size: 36px;}
             .info_card_wrap h5{font-size: 20px;}
             .form-box h3 {font-size: 24px;}
        }
        @media (max-width: 991px) {
            .contact_section h1{font-size: 30px;}
             .info_card_wrap h5{font-size: 18px;}
             .form-box h3 {font-size: 22px;}
        }
        @media (max-width: 767px) {
            .contact_section h1{font-size: 24px;}
            .info_card_wrap h5{font-size: 18px;}
            .form-box h3 {font-size: 20px;}
        }
        @media (max-width: 480px) {

        }

    </style>
    </head>

    <body>

        <section class="contact_section">
            <div class="container">
                <div class="title">
                    <h1>Contact Us</h1>
                    <p>Have questions or need assistance? Reach out to
                        us!We’d love to hear from you.</p>
                </div>

                <div class="row">

                    <!-- Right Form -->
                    <div class="col-md-7">
                        <div class="form-box">
                            <h3>Get In Touch</h3>

                            <form>
                                <div class="row">
                                    <div class="col-md-6">
                                        <input type="text"
                                            class="form-control custom-input mb-3"
                                            placeholder="First Name">
                                    </div>
                                    <div class="col-md-6">
                                        <input type="text"
                                            class="form-control custom-input mb-3"
                                            placeholder="Last Name">
                                    </div>
                                </div>
                                <input type="email"
                                    class="form-control custom-input mb-3"
                                    placeholder="Email Address">
                                <input type="text"
                                    class="form-control custom-input mb-3"
                                    placeholder="Subject">
                                <textarea class="form-control custom-input mb-3"
                                    placeholder="Message"></textarea>

                                <button class="btn btn-custom">Send
                                    Message</button>
                            </form>
                        </div>
                    </div>

                    <div class="col-md-5">
                        <div class="info-card">
                            <div class="info_card_wrap">
                                <h5>Call Us</h5>
                                <div class="info_wrappper">
                                    <i class="fa-solid fa-phone"></i>
                                    <a href="tel:+123 456 7890">+123 456
                                        7890</a>
                                </div>
                            </div>
                            <div class="info_card_wrap">
                                <h5>Email Us</h5>
                                <div class="info_wrappper">
                                    <i class="fa-solid fa-envelope"></i>
                                    <a
                                        href="email:info@example.com">info@example.com</a>
                                </div>
                            </div>

                            <div class="info_card_wrap">
                                <h5>Follow Us</h5>
                                <div class="social d-flex gap-2 mt-2">
                                    <a href="https://www.facebook.com/"
                                        aria-label="Facebook"
                                        class="social-circle"
                                        target="_blank"
                                        rel="noopener noreferrer">
                                        <i class="fa-brands fa-facebook-f"></i>
                                    </a>

                                    <a href="https://www.instagram.com/"
                                        aria-label="Instagram"
                                        class="social-circle"
                                        target="_blank"
                                        rel="noopener noreferrer">
                                        <i class="fa-brands fa-instagram"></i>
                                    </a>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>

                <!-- Bottom Image -->
                <div class="bottom-img">
                    <img src="assets/images/mitiari_banner2.png"
                        alt="Brass kettle and cups" class="img-fluid">
                </div>

            </div>
        </section>

    </body>

</html>
